name: Keep Render Alive

on:
  schedule:
    # 每 10 分钟 ping 一次(render 免费 15 分钟无请求才休眠,10 分钟间隔足够安全)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 手动触发(Actions 页面可点 Run workflow 测试)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "==> $(date -u) 开始 ping sanwen-dengfeng"
          code=$(curl -s -o /tmp/resp -w "%{http_code}" --max-time 30 https://sanwen-dengfeng.onrender.com/api/health)
          body=$(cat /tmp/resp)
          echo "HTTP $code"
          echo "Body: $body"
          if [ "$code" = "200" ] && echo "$body" | grep -q '"ok":true'; then
            echo "✓ 服务健康"
          else
            echo "✗ 服务异常,建议手动检查"
            exit 1
          fi
