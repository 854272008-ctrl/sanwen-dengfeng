name: Keep Render + Supabase Alive

on:
  schedule:
    # 每 10 分钟 ping 一次 /api/stats(真查 DB)
    # 同时保活 render(15 分钟休眠)和 Supabase(7 天无活动暂停)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 手动触发(Actions 页面可点 Run workflow 测试)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping stats endpoint (activates render + Supabase DB)
        run: |
          echo "==> $(date -u) 开始 ping sanwen-dengfeng /api/stats"
          code=$(curl -s -o /tmp/resp -w "%{http_code}" --max-time 30 https://sanwen-dengfeng.onrender.com/api/stats)
          body=$(cat /tmp/resp)
          echo "HTTP $code"
          echo "Body: $body"
          if [ "$code" = "200" ] && echo "$body" | grep -q '"target"'; then
            echo "✓ render + Supabase 均健康"
          else
            echo "✗ 服务异常,建议手动检查"
            exit 1
          fi
